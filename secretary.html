<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团支书后台</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",Arial,sans-serif;}
body{
    background:linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
    min-height:100vh;
}
@keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
.top-bar{height:60px;background:rgba(255,255,255,0.9);border-bottom:1px solid #e4e7ed;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:999;}
.top-bar .logo{font-size:20px;font-weight:bold;color:#303133;}
.top-bar .user-info{display:flex;align-items:center;gap:15px;}
.top-bar .user-info .avatar{width:36px;height:36px;border-radius:50%;background:#f5a623;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;}
.btn-refresh{background:#67C23A;margin-right:10px;padding:6px 12px;font-size:14px;color:#fff;border:none;border-radius:4px;cursor:pointer;}
.sidebar{width:200px;background:rgba(48,65,86,0.9);position:fixed;top:60px;left:0;bottom:0;padding-top:20px;}
.sidebar .menu-item{color:#bfcbd9;height:50px;line-height:50px;padding:0 20px;cursor:pointer;transition:all 0.3s;border-left:3px solid transparent;}
.sidebar .menu-item:hover,.sidebar .menu-item.active{background:#263445;color:#fff;border-left-color:#f5a623;}
.main-content{margin-left:200px;margin-top:60px;padding:20px;min-height:calc(100vh - 60px);}
.welcome-card{background:rgba(255,255,255,0.95);border-radius:8px;padding:30px;box-shadow:0 2px 12px 0 rgba(0,0,0,0.1);}
.welcome-card h1{color:#303133;margin-bottom:15px;}
.page{display:none;}.page.active{display:block;}
.page-content{background:rgba(255,255,255,0.9);border-radius:12px;padding:20px;}
table{width:100%;border-collapse:collapse;margin:20px 0;background:rgba(255,255,255,0.95);}
th,td{border:1px solid #eee;padding:10px;text-align:center;font-size:13px;}
th{background:#f5f7fa;}
button{background:#409eff;color:white;padding:6px 10px;border:none;border-radius:4px;cursor:pointer;font-size:13px;}
.btn-red{background:#F56C6C;}
.btn-green{background:#67C23A;}
input,select{padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;font-size:13px;}
h3{color:#303133;margin-bottom:15px;}
.form-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:15px;align-items:flex-end;}
.form-row input,.form-row select{flex:1;min-width:100px;}
.form-row button{height:38px;}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="top-bar">
<div class="logo">团支书中心</div>
<div class="user-info">
<button class="btn-refresh" onclick="refreshCurrentPage()">🔄 刷新</button>
<span id="secretaryName">团支书</span><div class="avatar">团</div>
</div>
</div>

<div class="sidebar">
<div class="menu-item active" onclick="showPage('home')">首页</div>
<div class="menu-item" onclick="showPage('leagueMeeting')">申报团会</div>
<div class="menu-item" onclick="showPage('roomApply')">申报教室</div>
<div class="menu-item" onclick="showPage('profile')">修改个人信息</div>
<div class="menu-item" onclick="logout()">退出登录</div>
</div>

<div class="main-content">
<!-- 首页 -->
<div class="page active" id="page-home">
<div class="welcome-card"><h1 id="welcomeText">欢迎！</h1></div>
</div>

<!-- 申报团会 -->
<div class="page" id="page-leagueMeeting">
<div class="page-content">
<h3>申报团会</h3>
<div class="form-row">
    <input id="lmLeagueName" placeholder="团支部名称">
    <select id="lmDate"><option value="">选择日期</option></select>
    <select id="lmStartLesson"><option value="">开始课节</option></select>
    <select id="lmEndLesson"><option value="">结束课节</option></select>
    <input id="lmAttendees" placeholder="人数" type="number" style="flex:0.5;">
    <input id="lmCounselor" placeholder="辅导员" style="flex:1.5;">
    <button class="btn-green" onclick="submitLeagueMeeting()">提交</button>
    <button onclick="refreshLeagueMeeting()">刷新</button>
</div>
<table>
    <tr><th>团支部名称</th><th>团会时间</th><th>人数</th><th>辅导员</th><th>申报人</th><th>申报时间</th><th>操作</th></tr>
    <tbody id="leagueMeetingList"></tbody>
</table>
</div>
</div>

<!-- 申报教室 -->
<div class="page" id="page-roomApply">
<div class="page-content">
<h3>申报教室</h3>
<div class="form-row">
    <input id="raClassName" placeholder="申请班级">
    <input id="raReason" placeholder="申请原因">
    <input id="raCounselor" placeholder="辅导员信息">
    <input id="raRoom" placeholder="教室（纪检部填写）" disabled style="background:#f5f5f5;">
    <select id="raStatus" disabled style="background:#f5f5f5;">
        <option value="审批中">审批中</option>
        <option value="已审批">已审批</option>
    </select>
    <button class="btn-green" onclick="submitRoomApply()">提交</button>
    <button onclick="refreshRoomApply()">刷新</button>
</div>
<table>
    <tr><th>申请班级</th><th>申请原因</th><th>辅导员</th><th>教室</th><th>审批状态</th><th>申报人</th><th>时间</th><th>操作</th></tr>
    <tbody id="roomApplyList"></tbody>
</table>
</div>
</div>

<!-- 修改个人信息 -->
<div class="page" id="page-profile">
<div class="page-content">
<h3>修改个人信息</h3>
<input id="newUid" placeholder="新账号" style="width:200px;display:block;">
<input id="newPwd" placeholder="新密码" style="width:200px;display:block;">
<button onclick="updateProfile()">提交</button>
</div>
</div>
</div>

<script>
(function() {
    const SUPABASE_URL = "https://nsyonfiaqniensvcrdao.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zeW9uZmlhcW5pZW5zdmNyZGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjIyNDQsImV4cCI6MjA5MTYzODI0NH0.ZxgkRA8Wp2Zy9ujwkya3apTXHECHvmeilf8qf-3MY78";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const s = JSON.parse(sessionStorage.getItem('user'));
    if(!s || s.role !== 'secretary'){alert('请登录');location.href='login.html';}

    document.getElementById('secretaryName').innerText = s.name;
    document.getElementById('welcomeText').innerText = `欢迎您，${s.name}团支书！`;

    window.$ = id => document.getElementById(id);

    // 初始化日期和课节选择器
    function initTimeSelectors() {
        let now = new Date();
        
        // 生成未来30天的日期选项
        let dateHtml = '';
        for(let i = 0; i <= 30; i++) {
            let d = new Date(now);
            d.setDate(d.getDate() + i);
            let dateStr = d.getFullYear() + '.' + (d.getMonth()+1).toString().padStart(2,'0') + '.' + d.getDate().toString().padStart(2,'0');
            let weekDay = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
            let selected = i === 0 ? 'selected' : '';
            dateHtml += `<option value="${dateStr}" ${selected}>${dateStr} ${weekDay}</option>`;
        }
        $('lmDate').innerHTML = dateHtml;
        
        // 生成开始课节选项（1-12节）
        let lessonHtml = '<option value="">开始课节</option>';
        for(let j = 1; j <= 12; j++) {
            lessonHtml += `<option value="${j}">第${j}节</option>`;
        }
        $('lmStartLesson').innerHTML = lessonHtml;
        $('lmEndLesson').innerHTML = '<option value="">结束课节</option>';
        
        // 当开始课节改变时，更新结束课节选项
        $('lmStartLesson').onchange = function() {
            let start = parseInt(this.value);
            let endHtml = '<option value="">结束课节</option>';
            if(start) {
                for(let j = start; j <= 12; j++) {
                    endHtml += `<option value="${j}">第${j}节</option>`;
                }
            }
            $('lmEndLesson').innerHTML = endHtml;
        };
    }

    initTimeSelectors();

    window.showPage = function(id){
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
        $('page-'+id).classList.add('active');
        document.querySelector(`[onclick="showPage('${id}')"]`).classList.add('active');
        if(id==='leagueMeeting') refreshLeagueMeeting();
        if(id==='roomApply') refreshRoomApply();
    };

    window.refreshCurrentPage = function(){
        const activePage = document.querySelector('.page.active');
        if(activePage.id === 'page-leagueMeeting'){ refreshLeagueMeeting(); alert('已刷新'); }
        else if(activePage.id === 'page-roomApply'){ refreshRoomApply(); alert('已刷新'); }
        else { alert('当前页面无需刷新'); }
    };

    window.logout = function(){
        sessionStorage.removeItem('user');
        location.href='login.html';
    };

    // ========== 申报团会 ==========
    async function refreshLeagueMeeting(){
        const { data } = await sb.from('league_meetings')
            .select('*')
            .eq('reporter', s.name)
            .order('created_at', { ascending: false });
        
        let html = '';
        if(data && data.length > 0){
            data.forEach(r => {
                let createdAt = r.created_at ? new Date(r.created_at).toLocaleString('zh-CN') : '';
                html += `<tr>
                    <td>${r.league_name || ''}</td>
                    <td>${r.meeting_time || ''}</td>
                    <td>${r.attendees || 0}</td>
                    <td>${r.counselor || ''}</td>
                    <td>${r.reporter || ''}</td>
                    <td>${createdAt}</td>
                    <td>
                        <button onclick="editLeagueMeeting('${r.id}')">修改</button>
                        <button class="btn-red" onclick="delLeagueMeeting('${r.id}')">删除</button>
                    </td>
                </tr>`;
            });
        }
        $('leagueMeetingList').innerHTML = html || '<tr><td colspan="7">暂无申报记录</td></tr>';
    }
    window.refreshLeagueMeeting = refreshLeagueMeeting;

    window.submitLeagueMeeting = async function(){
        let leagueName = $('lmLeagueName').value.trim();
        let date = $('lmDate').value;
        let startLesson = $('lmStartLesson').value;
        let endLesson = $('lmEndLesson').value;
        let attendees = parseInt($('lmAttendees').value) || 0;
        let counselor = $('lmCounselor').value.trim();
        
        if(!leagueName || !date || !startLesson || !endLesson || !attendees || !counselor){
            alert('请填写完整（团支部名称、日期、开始课节、结束课节、人数、辅导员）');
            return;
        }
        
        let meetingTime = `${date} 第${startLesson}-${endLesson}节`;
        
        let id = 'lm_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
        
        const { error } = await sb.from('league_meetings').insert([{
            id, league_name: leagueName, meeting_time: meetingTime,
            attendees, counselor, reporter: s.name
        }]);
        
        if(error){ alert('提交失败：'+error.message); return; }
        
        $('lmLeagueName').value = '';
        $('lmAttendees').value = '';
        $('lmCounselor').value = '';
        initTimeSelectors();
        refreshLeagueMeeting();
        alert('提交成功');
    };

    window.editLeagueMeeting = async function(id){
        const { data } = await sb.from('league_meetings').select('*').eq('id', id).maybeSingle();
        if(data){
            $('lmLeagueName').value = data.league_name || '';
            $('lmAttendees').value = data.attendees || '';
            $('lmCounselor').value = data.counselor || '';
            window.currentEditLMId = id;
        }
    };

    window.delLeagueMeeting = async function(id){
        if(!confirm('确定删除？')) return;
        await sb.from('league_meetings').delete().eq('id', id);
        refreshLeagueMeeting();
    };

    // ========== 申报教室 ==========
    async function refreshRoomApply(){
        const { data } = await sb.from('room_applications')
            .select('*')
            .eq('reporter', s.name)
            .order('created_at', { ascending: false });
        
        let html = '';
        if(data && data.length > 0){
            data.forEach(r => {
                let createdAt = r.created_at ? new Date(r.created_at).toLocaleString('zh-CN') : '';
                html += `<tr>
                    <td>${r.class_name || ''}</td>
                    <td>${r.reason || ''}</td>
                    <td>${r.counselor || ''}</td>
                    <td>${r.room_number || '待分配'}</td>
                    <td>${r.status || '审批中'}</td>
                    <td>${r.reporter || ''}</td>
                    <td>${createdAt}</td>
                    <td>
                        <button onclick="editRoomApply('${r.id}')">修改</button>
                        <button class="btn-red" onclick="delRoomApply('${r.id}')">删除</button>
                    </td>
                </tr>`;
            });
        }
        $('roomApplyList').innerHTML = html || '<tr><td colspan="8">暂无申报记录</td></tr>';
    }
    window.refreshRoomApply = refreshRoomApply;

    window.submitRoomApply = async function(){
        let className = $('raClassName').value.trim();
        let reason = $('raReason').value.trim();
        let counselor = $('raCounselor').value.trim();
        
        if(!className || !reason || !counselor){
            alert('请填写完整');
            return;
        }
        
        let id = 'ra_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
        
        const { error } = await sb.from('room_applications').insert([{
            id, class_name: className, reason, counselor,
            status: '审批中', reporter: s.name
        }]);
        
        if(error){ alert('提交失败：'+error.message); return; }
        
        $('raClassName').value = '';
        $('raReason').value = '';
        $('raCounselor').value = '';
        refreshRoomApply();
        alert('提交成功');
    };

    window.editRoomApply = async function(id){
        const { data } = await sb.from('room_applications').select('*').eq('id', id).maybeSingle();
        if(data){
            $('raClassName').value = data.class_name || '';
            $('raReason').value = data.reason || '';
            $('raCounselor').value = data.counselor || '';
            window.currentEditRAId = id;
        }
    };

    window.delRoomApply = async function(id){
        if(!confirm('确定删除？')) return;
        await sb.from('room_applications').delete().eq('id', id);
        refreshRoomApply();
    };

    // ========== 修改个人信息 ==========
    window.updateProfile = async function(){
        let nu = $('newUid').value.trim();
        let np = $('newPwd').value.trim();
        if(!nu && !np){alert('至少改一项');return;}
        if(np && np.length<6){alert('密码至少6位');return;}
        
        const updateData = {};
        if(nu) updateData.uid = nu;
        if(np) updateData.pwd = np;
        
        const { error } = await sb.from('users').update(updateData).eq('uid', s.uid);
        if(error){alert('修改失败：'+error.message);return;}
        
        const updatedUser = {...s};
        if(nu) updatedUser.uid = nu;
        sessionStorage.setItem('user', JSON.stringify(updatedUser));
        
        alert('修改成功');
        $('newUid').value='';
        $('newPwd').value='';
        if(nu) location.reload();
    };

})();
</script>
</body>
</html>
