<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
body{
    max-width:400px;
    margin:50px auto;
    font-family:Arial;
    background-image:url(https://picsum.photos/id/1050/1920/1080);
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.box{
    padding:30px;
    border:1px solid #ddd;
    border-radius:15px;
    background:rgba(255,255,255,0.92);
    box-shadow:0 8px 30px rgba(0,0,0,0.1);
    backdrop-filter:blur(5px);
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ddd;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#409eff;
    color:white;
    border:none;
    border-radius:8px;
    margin-top:5px;
    cursor:pointer;
    font-size:15px;
}
.btn2{background:#67C23A}
.btn4{background:#f56c6c;margin-top:5px;}
.btn5{background:#e6a23c;margin-top:5px;}
.btn6{background:#909399;margin-top:5px;}
.role-group {
    display: flex;
    justify-content: space-around;
    margin: 10px 0;
    padding: 5px 0;
}
.role-group label {
    display: flex;
    align-items:center;
    cursor:pointer;
    color:#666;
    font-size:14px;
}
.role-group input[type="radio"] {
    width:16px;
    height:16px;
    margin:0 5px 0 0;
    padding:0;
}
.reset-tip-modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    align-items:center;
    justify-content:center;
    z-index:999;
}
.reset-tip-content {
    width:350px;
    padding:25px;
    border-radius:12px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(8px);
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    background-image:url(https://picsum.photos/id/1074/800/600);
    background-size:cover;
    background-position:center;
    color:#333;
}
.reset-tip-content h3 {
    margin-bottom:15px;
    color:#409eff;
}
.reset-tip-content p {
    line-height:1.6;
    margin:10px 0;
    background:rgba(255,255,255,0.8);
    padding:8px;
    border-radius:6px;
}
.reset-tip-close {
    margin-top:20px;
    padding:8px 20px;
    background:#409eff;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.error-msg {
    color: #f56c6c;
    font-size: 14px;
    margin-top: 5px;
    text-align: center;
    min-height: 20px;
}
.success-msg {
    color: #67C23A;
    font-size: 14px;
    margin-top: 5px;
    text-align: center;
}
.debug-info {
    margin-top: 15px;
    padding: 10px;
    background: #f5f7fa;
    border-radius: 8px;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
    text-align: left;
}
</style>
</head>
<body>

<div class="box">
<h2>信管系查团课系统</h2>
<input id="uid" placeholder="学号/工号" maxlength="20">
<input id="pwd" type="password" placeholder="密码" minlength="6">

<div class="role-group">
<label><input type="radio" name="role" value="admin" checked> 管理员</label>
<label><input type="radio" name="role" value="user"> 干事</label>
<label><input type="radio" name="role" value="teacher"> 部长</label>
</div>

<div id="loginError" class="error-msg"></div>
<div id="loginSuccess" class="success-msg"></div>

<button onclick="login()">登录</button>
<button class="btn5" onclick="checkAllTables()">🔍 检查所有表</button>
<button class="btn5" onclick="forceCreateAdmin()">⚡ 强制创建管理员</button>
<button class="btn6" onclick="testDirectQuery()">🧪 测试直接查询</button>
<button class="btn2" onclick="location.href='register.html'">干事注册</button>
<button class="btn4" onclick="showResetTip()">重置密码指引</button>

<div id="debugInfo" class="debug-info"></div>
</div>

<div class="reset-tip-modal" id="resetTipModal">
<div class="reset-tip-content">
<h3>密码重置指引</h3>
<p>📚 干事用户：请联系部长申请重置密码</p>
<p>👨‍🏫 部长用户：请联系系统管理员申请重置密码</p>
<p>🔑 学生重置后的初始密码为：111111</p>
<p>🔑 部长重置后的初始密码为：666666</p>
<button class="reset-tip-close" onclick="closeResetTip()">关闭</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = "https://nsyonfiaqniensvcrdao.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zeW9uZmlhcW5pZW5zdmNyZGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjIyNDQsImV4cCI6MjA5MTYzODI0NH0.ZxgkRA8Wp2Zy9ujwkya3apTXHECHvmeilf8qf-3MY78";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const debugDiv = document.getElementById('debugInfo');

    function log(msg) {
        debugDiv.innerHTML += msg + '<br>';
        debugDiv.scrollTop = debugDiv.scrollHeight;
    }

    function clearLog() {
        debugDiv.innerHTML = '';
    }

    // 测试直接查询（不使用任何过滤条件）
    window.testDirectQuery = async function() {
        clearLog();
        log('🧪 测试直接查询 users 表（无过滤条件）...');
        
        try {
            const { data, error, status } = await sb
                .from('users')
                .select('*')
                .limit(10);
            
            log('状态码: ' + status);
            
            if(error) {
                log('❌ 错误: ' + error.message);
                log('错误详情: ' + JSON.stringify(error));
                return;
            }
            
            if(!data || data.length === 0) {
                log('📭 users 表是空的');
            } else {
                log('✅ 找到 ' + data.length + ' 条数据:');
                data.forEach((row, i) => {
                    log(`  ${i+1}. uid="${row.uid}", name="${row.name}", role="${row.role}", pwd="${row.pwd}"`);
                });
            }
        } catch(err) {
            log('❌ 异常: ' + err.message);
        }
    };

    // 检查所有可能的表
    window.checkAllTables = async function() {
        clearLog();
        log('🔍 正在检查数据库...');
        
        const tables = ['users', 'profiles', 'user', 'accounts', 'User', 'Users'];
        
        for(let table of tables) {
            try {
                const { data, error } = await sb.from(table).select('count', { count: 'exact', head: true });
                if(!error) {
                    log('✅ 表 "' + table + '" 存在');
                    
                    // 尝试读取数据
                    const { data: rows } = await sb.from(table).select('*').limit(5);
                    if(rows && rows.length > 0) {
                        log(`   数据示例: ${JSON.stringify(rows[0]).substring(0, 100)}...`);
                    }
                } else if(error.code !== '42P01') { // 42P01 = 表不存在
                    log('⚠️ 表 "' + table + '": ' + error.message);
                }
            } catch(e) {
                // 表不存在，跳过
            }
        }
        
        // 重点检查 users 表
        log('');
        log('📋 详细检查 users 表:');
        const { data, error } = await sb.from('users').select('*');
        
        if(error) {
            log('❌ users 表查询失败: ' + error.message);
            log('错误码: ' + error.code);
            log('提示: ' + error.hint);
        } else if(!data || data.length === 0) {
            log('📭 users 表存在但是空的');
        } else {
            log('✅ users 表有 ' + data.length + ' 条数据:');
            data.forEach(row => {
                log(`  - uid: "${row.uid}", name: "${row.name}", role: "${row.role}", pwd: "${row.pwd}"`);
            });
        }
    };

    // 强制创建管理员
    window.forceCreateAdmin = async function() {
        clearLog();
        log('⚡ 强制创建管理员账号...');
        
        const adminData = {
            uid: 'admin',
            name: '管理员',
            pwd: '123456',
            role: 'admin',
            dept: '系统'
        };
        
        log('准备插入数据: ' + JSON.stringify(adminData));
        
        try {
            // 先尝试删除旧数据
            const { error: delError } = await sb
                .from('users')
                .delete()
                .eq('uid', 'admin');
            
            if(delError) {
                log('⚠️ 删除旧数据失败: ' + delError.message);
            } else {
                log('✅ 已删除旧的管理员数据');
            }
            
            // 插入新数据
            const { data, error } = await sb
                .from('users')
                .insert([adminData])
                .select();
            
            if(error) {
                log('❌ 插入失败: ' + error.message);
                log('错误详情: ' + JSON.stringify(error));
                
                // 尝试用 upsert
                log('');
                log('🔄 尝试使用 upsert...');
                const { error: upsertError } = await sb
                    .from('users')
                    .upsert([adminData], { onConflict: 'uid' });
                
                if(upsertError) {
                    log('❌ upsert 也失败了: ' + upsertError.message);
                } else {
                    log('✅ upsert 成功！');
                    document.getElementById('uid').value = 'admin';
                    document.getElementById('pwd').value = '123456';
                }
                return;
            }
            
            log('✅ 管理员创建成功！');
            log('返回数据: ' + JSON.stringify(data));
            
            document.getElementById('uid').value = 'admin';
            document.getElementById('pwd').value = '123456';
            document.querySelector('input[value="admin"]').checked = true;
            
            log('');
            log('🎉 账号: admin，密码: 123456，可以直接登录了！');
        } catch(err) {
            log('❌ 异常: ' + err.message);
        }
    };

    window.login = async function() {
        const uid = document.getElementById('uid').value.trim();
        const pwd = document.getElementById('pwd').value.trim();
        const role = document.querySelector('input[name="role"]:checked').value;
        const errorDiv = document.getElementById('loginError');
        const successDiv = document.getElementById('loginSuccess');

        errorDiv.textContent = '';
        successDiv.textContent = '';
        clearLog();
        log('🔐 尝试登录: ' + uid);

        try {
            const { data: user, error } = await sb
                .from('users')
                .select('*')
                .eq('uid', uid)
                .maybeSingle();

            if(error) {
                log('❌ 查询错误: ' + error.message);
                errorDiv.textContent = '系统错误';
                return;
            }

            if(!user) {
                log('❌ 用户不存在: ' + uid);
                errorDiv.textContent = '账号不存在';
                return;
            }

            log('✅ 找到用户: ' + user.uid + ', 角色: ' + user.role);

            if(user.pwd !== pwd) {
                log('❌ 密码错误，正确密码是: ' + user.pwd);
                errorDiv.textContent = '密码错误';
                return;
            }

            if(user.role !== role) {
                log('❌ 角色不匹配，实际是: ' + user.role);
                errorDiv.textContent = '角色不匹配';
                return;
            }

            log('✅ 登录成功！');
            successDiv.textContent = '登录成功！';

            const safeUser = {
                uid: user.uid,
                name: user.name,
                role: user.role,
                dept: user.dept
            };
            sessionStorage.setItem("user", JSON.stringify(safeUser));
            
            setTimeout(() => {
                if(user.role === 'admin') location.href = 'admin.html';
                else if(user.role === 'user') location.href = 'home.html';
                else if(user.role === 'teacher') location.href = 'teacher.html';
            }, 500);
        } catch(err) {
            log('❌ 异常: ' + err.message);
            errorDiv.textContent = '网络错误';
        }
    };

    window.showResetTip = function() {
        document.getElementById('resetTipModal').style.display = 'flex';
    };
    
    window.closeResetTip = function() {
        document.getElementById('resetTipModal').style.display = 'none';
    };

    document.getElementById('pwd').addEventListener('keydown', function(e) {
        if(e.key === 'Enter') window.login();
    });

    // 页面加载时自动测试
    setTimeout(() => {
        clearLog();
        log('🚀 页面加载完成，点击按钮测试数据库');
    }, 500);
})();
</script>
</body>
</html>
