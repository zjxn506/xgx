<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
body{
    max-width:400px;
    margin:50px auto;
    font-family:Arial;
    background-image:url(https://picsum.photos/id/1050/1920/1080);
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.box{
    padding:30px;
    border:1px solid #ddd;
    border-radius:15px;
    background:rgba(255,255,255,0.92);
    box-shadow:0 8px 30px rgba(0,0,0,0.1);
    backdrop-filter:blur(5px);
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ddd;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#409eff;
    color:white;
    border:none;
    border-radius:8px;
    margin-top:5px;
    cursor:pointer;
    font-size:15px;
}
.btn2{background:#67C23A}
.btn4{background:#f56c6c;margin-top:5px;}
.btn5{background:#e6a23c;margin-top:5px;}
.role-group {
    display: flex;
    justify-content: space-around;
    margin: 10px 0;
    padding: 5px 0;
}
.role-group label {
    display: flex;
    align-items:center;
    cursor:pointer;
    color:#666;
    font-size:14px;
}
.role-group input[type="radio"] {
    width:16px;
    height:16px;
    margin:0 5px 0 0;
    padding:0;
}
.reset-tip-modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    align-items:center;
    justify-content:center;
    z-index:999;
}
.reset-tip-content {
    width:350px;
    padding:25px;
    border-radius:12px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(8px);
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    background-image:url(https://picsum.photos/id/1074/800/600);
    background-size:cover;
    background-position:center;
    color:#333;
}
.reset-tip-content h3 {
    margin-bottom:15px;
    color:#409eff;
}
.reset-tip-content p {
    line-height:1.6;
    margin:10px 0;
    background:rgba(255,255,255,0.8);
    padding:8px;
    border-radius:6px;
}
.reset-tip-close {
    margin-top:20px;
    padding:8px 20px;
    background:#409eff;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.error-msg {
    color: #f56c6c;
    font-size: 14px;
    margin-top: 5px;
    text-align: center;
    min-height: 20px;
}
.success-msg {
    color: #67C23A;
    font-size: 14px;
    margin-top: 5px;
    text-align: center;
}
.debug-info {
    margin-top: 15px;
    padding: 10px;
    background: #f5f7fa;
    border-radius: 8px;
    font-size: 12px;
    max-height: 150px;
    overflow-y: auto;
}
</style>
</head>
<body>

<div class="box">
<h2>信管系查团课系统</h2>
<input id="uid" placeholder="学号/工号" maxlength="20">
<input id="pwd" type="password" placeholder="密码" minlength="6">

<div class="role-group">
<label><input type="radio" name="role" value="admin" checked> 管理员</label>
<label><input type="radio" name="role" value="user"> 干事</label>
<label><input type="radio" name="role" value="teacher"> 部长</label>
</div>

<div id="loginError" class="error-msg"></div>
<div id="loginSuccess" class="success-msg"></div>

<button onclick="login()">登录</button>
<button class="btn5" onclick="checkDatabase()">🔍 检查数据库</button>
<button class="btn5" onclick="createAdmin()">⚡ 创建管理员</button>
<button class="btn2" onclick="location.href='register.html'">干事注册</button>
<button class="btn4" onclick="showResetTip()">重置密码</button>

<div id="debugInfo" class="debug-info" style="display:none;"></div>
</div>

<div class="reset-tip-modal" id="resetTipModal">
<div class="reset-tip-content">
<h3>密码重置指引</h3>
<p>📚 学生用户：请联系老师申请重置密码</p>
<p>👨‍🏫 部长用户：请联系系统管理员申请重置密码</p>
<p>🔑 学生重置后的初始密码为：111111</p>
<p>🔑 部长重置后的初始密码为：666666</p>
<button class="reset-tip-close" onclick="closeResetTip()">关闭</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = "https://nsyonfiaqniensvcrdao.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zeW9uZmlhcW5pZW5zdmNyZGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjIyNDQsImV4cCI6MjA5MTYzODI0NH0.ZxgkRA8Wp2Zy9ujwkya3apTXHECHvmeilf8qf-3MY78";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showDebug(text) {
        const debugDiv = document.getElementById('debugInfo');
        debugDiv.style.display = 'block';
        debugDiv.innerHTML = text;
    }

    // 检查数据库中有哪些用户
    window.checkDatabase = async function() {
        showDebug('正在查询数据库...');
        
        try {
            const { data: users, error } = await sb
                .from('users')
                .select('*');
            
            if(error) {
                showDebug('❌ 查询失败：' + error.message);
                return;
            }
            
            if(!users || users.length === 0) {
                showDebug('📭 数据库 users 表是空的，没有任何用户。<br><br>点击"创建管理员"按钮添加管理员账号。');
                return;
            }
            
            let html = `✅ 找到 ${users.length} 个用户：<br><br>`;
            users.forEach((u, i) => {
                html += `${i+1}. uid: ${u.uid}, 姓名: ${u.name}, 角色: ${u.role}, 密码: ${u.pwd}<br>`;
            });
            showDebug(html);
        } catch(err) {
            showDebug('❌ 异常：' + err.message);
        }
    };

    // 创建管理员账号
    window.createAdmin = async function() {
        showDebug('正在创建管理员账号...');
        
        try {
            // 先检查是否已存在
            const { data: existing } = await sb
                .from('users')
                .select('uid')
                .eq('uid', 'admin')
                .maybeSingle();
            
            if(existing) {
                // 更新密码
                const { error: updateError } = await sb
                    .from('users')
                    .update({ pwd: '123456' })
                    .eq('uid', 'admin');
                
                if(updateError) {
                    showDebug('❌ 更新失败：' + updateError.message);
                } else {
                    showDebug('✅ 管理员已存在，密码已重置为 123456<br><br>现在可以用 admin/123456 登录了');
                    document.getElementById('uid').value = 'admin';
                    document.getElementById('pwd').value = '123456';
                }
                return;
            }
            
            // 创建新管理员
            const { error } = await sb
                .from('users')
                .insert([{
                    uid: 'admin',
                    name: '管理员',
                    pwd: '123456',
                    role: 'admin',
                    dept: '系统'
                }]);
            
            if(error) {
                showDebug('❌ 创建失败：' + error.message);
                return;
            }
            
            showDebug('✅ 管理员账号创建成功！<br><br>账号：admin<br>密码：123456<br><br>已自动填入，直接点击登录即可。');
            document.getElementById('uid').value = 'admin';
            document.getElementById('pwd').value = '123456';
            document.querySelector('input[value="admin"]').checked = true;
        } catch(err) {
            showDebug('❌ 异常：' + err.message);
        }
    };

    window.login = async function() {
        const uid = document.getElementById('uid').value.trim();
        const pwd = document.getElementById('pwd').value.trim();
        const role = document.querySelector('input[name="role"]:checked').value;
        const errorDiv = document.getElementById('loginError');
        const successDiv = document.getElementById('loginSuccess');

        errorDiv.textContent = '';
        successDiv.textContent = '';

        if(!uid || !pwd){
            errorDiv.textContent = '请输入账号和密码';
            return;
        }

        showDebug('正在登录：' + uid);

        try {
            const { data: user, error } = await sb
                .from('users')
                .select('*')
                .eq('uid', uid)
                .maybeSingle();

            if(error) {
                console.error('查询错误:', error);
                errorDiv.textContent = '系统错误：' + error.message;
                showDebug('❌ 查询错误：' + error.message);
                return;
            }

            if(!user) {
                errorDiv.textContent = '账号不存在';
                showDebug('❌ 账号 "' + uid + '" 不存在<br><br>点击"检查数据库"查看所有用户，或点击"创建管理员"添加账号。');
                return;
            }

            showDebug('✅ 找到用户：' + user.uid + '，角色：' + user.role);

            if(user.pwd !== pwd) {
                errorDiv.textContent = '密码错误';
                showDebug('❌ 密码错误，正确密码是：' + user.pwd);
                return;
            }

            if(user.role !== role) {
                const roleNames = {admin:'管理员', teacher:'部长', user:'干事'};
                errorDiv.textContent = `角色不匹配，您是${roleNames[user.role]}`;
                showDebug(`❌ 角色不匹配，您选择的是"${role}"，但实际是"${user.role}"`);
                return;
            }

            successDiv.textContent = '登录成功！正在跳转...';
            showDebug('✅ 登录成功！');

            const safeUser = {
                uid: user.uid,
                name: user.name,
                role: user.role,
                dept: user.dept
            };
            sessionStorage.setItem("user", JSON.stringify(safeUser));
            
            setTimeout(() => {
                if(user.role === 'admin') {
                    location.href = 'admin.html';
                } else if(user.role === 'user') {
                    location.href = 'home.html';
                } else if(user.role === 'teacher') {
                    location.href = 'teacher.html';
                }
            }, 500);
        } catch(err) {
            console.error('登录异常:', err);
            errorDiv.textContent = '网络错误，请稍后重试';
            showDebug('❌ 异常：' + err.message);
        }
    };

    window.showResetTip = function() {
        document.getElementById('resetTipModal').style.display = 'flex';
    };
    
    window.closeResetTip = function() {
        document.getElementById('resetTipModal').style.display = 'none';
    };

    document.getElementById('pwd').addEventListener('keydown', function(e) {
        if(e.key === 'Enter') window.login();
    });

    // 页面加载时自动检查数据库
    setTimeout(() => {
        checkDatabase();
    }, 500);
})();
</script>
</body>
</html>
